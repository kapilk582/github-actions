# this is name of the workflow that will be display in the action tab
name: CICD
# manual click workflow whatever user needs
on:
  workflow_dispatch: 
    inputs:
      environment: 
        description: this is the environment value where this workflow runs
        default: "dev"
        required: true
        type: choice
        options:
             - dev
             - prod
             - staging
  
jobs:
# every jobs needs seperate runner thats called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build docker image
        run: echo "docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "test the container"
  deploy:
    if: ${{ github.event.inputs.environment == 'dev' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy the app
        run: echo "docker compose deploy the app"
