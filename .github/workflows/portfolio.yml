name: portfolio
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write


jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
           name: github-pages
           url: ${{steps.deploy-to-github-pages.outputs.page_url}}
          

        steps:
            # get access to your portfolio code via pre-built action
            - name: checkout code 
              uses: actions/checkout@v4

            # setup github pages to deploy your portfolio
            - name: setup github pages
              uses: actions/configure-pages@v4

              # static code artifacts are stored in the 'public' folder, so we need to specify it
            - name: upload static files
              uses: actions/upload-pages-artifact@v4
              with:
                path: .

            - name: deploy to github pages
              uses: actions/deploy-pages@v4

